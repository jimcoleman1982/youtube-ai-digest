<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube AI Digest</title>
  <meta name="description" content="AI-powered summaries of the best YouTube channels covering artificial intelligence">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>▶</text></svg>">
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <div class="app-header__inner">
      <div class="app-title">
        <span class="app-title__icon">▶</span>
        AI Digest
      </div>
      <nav class="app-nav">
        <a href="admin.html">Admin</a>
      </nav>
    </div>
  </header>

  <main class="container">

    <!-- Stats Bar -->
    <div class="stats-bar" id="stats-bar">
      <span class="stats-bar__item">
        <span class="stats-bar__dot stats-bar__dot--accent"></span>
        <span id="stats-new">0 new today</span>
      </span>
      <span class="stats-bar__item">
        <span class="stats-bar__dot stats-bar__dot--amber"></span>
        <span id="stats-important">0 high-importance</span>
      </span>
      <span class="stats-bar__item">
        <span class="stats-bar__dot"></span>
        <span id="stats-read-time">~0 min read</span>
      </span>
      <span class="stats-bar__item">
        <span class="stats-bar__dot"></span>
        <span id="stats-unread">0 unread</span>
      </span>
    </div>

    <!-- Ad-Hoc URL Input -->
    <section class="adhoc">
      <form class="adhoc__form" id="adhoc-form">
        <input
          type="url"
          class="adhoc__input"
          id="adhoc-input"
          placeholder="Paste any YouTube URL to summarize..."
          autocomplete="off"
          aria-label="YouTube video URL"
        >
        <button type="submit" class="adhoc__btn" id="adhoc-btn">Go</button>
      </form>
      <div class="adhoc__status" id="adhoc-status">
        <div class="adhoc__spinner"></div>
        <span id="adhoc-status-text">Pulling transcript and generating summary...</span>
      </div>
    </section>

    <!-- Filters -->
    <section class="filters">
      <div class="filters__search">
        <span class="filters__search-icon">&#9906;</span>
        <input
          type="text"
          class="filters__search-input"
          id="search-input"
          placeholder="Search summaries..."
          aria-label="Search summaries"
        >
      </div>
      <div class="filters__row">
        <button class="filter-pill filter-pill--channel" id="filter-channel">
          <span id="filter-channel-label">All Channels</span> &#9662;
          <select id="filter-channel-select" aria-label="Filter by channel">
            <option value="">All Channels</option>
          </select>
        </button>
        <button class="filter-pill" id="filter-starred" aria-pressed="false">
          &#9733; Starred
        </button>
        <button class="filter-pill" id="filter-unread" aria-pressed="false">
          Unread
        </button>
        <button class="filter-pill" id="filter-importance" aria-pressed="false">
          &#9733;&#9733;&#9733;&#9733;+
        </button>
      </div>
    </section>

    <!-- Ad-Hoc Results (inserted here by JS) -->
    <div id="adhoc-results"></div>

    <!-- Summary Feed -->
    <div class="feed" id="feed">
      <!-- Loading skeleton shown initially -->
      <div id="feed-skeleton">
        <div class="day-group is-expanded" style="margin-top:12px">
          <div class="day-header">
            <div class="skeleton skeleton-line" style="width:120px;height:18px;margin:0"></div>
            <div class="day-header__line"></div>
            <div class="skeleton skeleton-line" style="width:60px;height:14px;margin:0"></div>
          </div>
          <div class="day-body">
            <div class="skeleton-card"><div class="skeleton skeleton-line skeleton-line--short"></div><div class="skeleton skeleton-line skeleton-line--long"></div><div class="skeleton skeleton-line skeleton-line--bar"></div><div class="skeleton skeleton-line skeleton-line--medium"></div></div>
            <div class="skeleton-card"><div class="skeleton skeleton-line skeleton-line--short"></div><div class="skeleton skeleton-line skeleton-line--long"></div><div class="skeleton skeleton-line skeleton-line--bar"></div><div class="skeleton skeleton-line skeleton-line--medium"></div></div>
            <div class="skeleton-card"><div class="skeleton skeleton-line skeleton-line--short"></div><div class="skeleton skeleton-line skeleton-line--long"></div><div class="skeleton skeleton-line skeleton-line--bar"></div><div class="skeleton skeleton-line skeleton-line--medium"></div></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Load More -->
    <div class="load-more" id="load-more" style="display:none">
      <button class="load-more__btn" id="load-more-btn">Load more days</button>
    </div>

    <!-- Empty State -->
    <div class="empty-state" id="empty-state" style="display:none">
      <div class="empty-state__icon">▶</div>
      <div class="empty-state__text">No summaries yet</div>
      <div class="empty-state__sub">Paste a YouTube URL above to get started, or wait for the next hourly check.</div>
    </div>

  </main>

  <script src="js/state.js"></script>
  <script src="js/timeline.js"></script>
  <script src="js/tts.js"></script>
  <script src="js/adhoc.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
